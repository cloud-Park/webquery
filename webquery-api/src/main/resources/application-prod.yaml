spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    com.hdmf.webquery: INFO
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false